<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CineMatch - Movie Recommender{% endblock %}</title>
    <meta name="description" content="{% block meta_desc %}Discover your next favourite movie based on genre with CineMatch.{% endblock %}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #070710;
            --bg2: #0d0d1f;
            --glass: rgba(255,255,255,0.05);
            --glass-b: rgba(255,255,255,0.1);
            --glass-h: rgba(255,255,255,0.08);
            --t1: #ffffff;
            --t2: rgba(255,255,255,0.65);
            --t3: rgba(255,255,255,0.35);
            --a1: #a855f7;
            --a2: #ec4899;
            --ag: linear-gradient(135deg,#a855f7,#ec4899);
            --star: #f59e0b;
            --r-sm: 8px; --r-md: 16px; --r-lg: 24px;
            --tr: 0.3s cubic-bezier(0.4,0,0.2,1);
            --h: 'Outfit', sans-serif;
            --b: 'Inter', sans-serif;
        }
        *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body { font-family:var(--b); background:var(--bg); color:var(--t1); min-height:100vh; overflow-x:hidden; }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:var(--bg); }
        ::-webkit-scrollbar-thumb { background:var(--a1); border-radius:3px; }

        /* NAV */
        .nav {
            position:fixed; top:0; left:0; right:0; z-index:100;
            padding:14px 32px;
            background:rgba(7,7,16,0.85);
            backdrop-filter:blur(20px);
            border-bottom:1px solid var(--glass-b);
            display:flex; align-items:center; justify-content:space-between;
        }
        .nav-brand { display:flex; align-items:center; gap:10px; text-decoration:none; }
        .brand-ico {
            width:38px; height:38px; background:var(--ag); border-radius:10px;
            display:flex; align-items:center; justify-content:center; font-size:20px;
        }
        .brand-name {
            font-family:var(--h); font-size:22px; font-weight:800;
            background:var(--ag); -webkit-background-clip:text;
            -webkit-text-fill-color:transparent; background-clip:text;
        }
        .nav-tag { font-size:13px; color:var(--t2); }

        /* HERO */
        .hero {
            min-height:100vh; display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            text-align:center; padding:100px 20px 60px;
            position:relative; overflow:hidden;
        }
        .hero::before {
            content:''; position:absolute; inset:0;
            background:
                radial-gradient(ellipse at 25% 35%, rgba(168,85,247,0.18) 0%, transparent 60%),
                radial-gradient(ellipse at 75% 65%, rgba(236,72,153,0.14) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 85%, rgba(59,130,246,0.1) 0%, transparent 55%);
            animation:bgpulse 9s ease-in-out infinite alternate;
        }
        @keyframes bgpulse { 0%{transform:scale(1) rotate(0deg)} 100%{transform:scale(1.12) rotate(4deg)} }

        .hero-content { position:relative; z-index:1; max-width:820px; }
        .hero-badge {
            display:inline-flex; align-items:center; gap:8px;
            padding:6px 18px; background:var(--glass); border:1px solid var(--glass-b);
            border-radius:100px; font-size:13px; color:var(--t2); margin-bottom:24px;
            backdrop-filter:blur(10px);
        }
        .badge-dot { width:8px; height:8px; background:#10b981; border-radius:50%; animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

        .hero-title {
            font-family:var(--h); font-size:clamp(2.4rem,7vw,5rem);
            font-weight:800; line-height:1.1; margin-bottom:20px; letter-spacing:-0.02em;
        }
        .hero-title span { background:var(--ag); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .hero-sub { font-size:18px; color:var(--t2); max-width:500px; margin:0 auto 48px; line-height:1.6; }

        .hero-stats { display:flex; gap:48px; justify-content:center; margin-bottom:56px; }
        .stat-num { font-family:var(--h); font-size:34px; font-weight:800; background:var(--ag); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .stat-lbl { font-size:11px; color:var(--t3); text-transform:uppercase; letter-spacing:0.12em; margin-top:2px; }

        .scroll-hint {
            position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
            display:flex; flex-direction:column; align-items:center; gap:6px;
            color:var(--t3); font-size:12px; animation:bob 2.5s ease-in-out infinite;
        }
        @keyframes bob { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(-8px)} }

        /* GENRE SECTION */
        .genres-sec { padding:80px 32px; max-width:1400px; margin:0 auto; }
        .sec-label { font-size:11px; text-transform:uppercase; letter-spacing:0.15em; color:var(--a1); font-weight:600; margin-bottom:10px; }
        .sec-title { font-family:var(--h); font-size:clamp(1.8rem,4vw,2.8rem); font-weight:700; margin-bottom:48px; }

        .genre-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:20px; }

        .genre-card {
            position:relative; border-radius:var(--r-lg); overflow:hidden;
            cursor:pointer; text-decoration:none; height:175px;
            display:flex; flex-direction:column; justify-content:flex-end; padding:22px;
            transition:all var(--tr);
        }
        .genre-card::after {
            content:''; position:absolute; inset:0;
            background:linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 65%);
        }
        .genre-card:hover { transform:translateY(-7px) scale(1.02); box-shadow:0 24px 60px rgba(0,0,0,0.55); }

        .g-ico { position:absolute; top:18px; right:18px; font-size:50px; z-index:1; transition:transform var(--tr); filter:drop-shadow(0 4px 8px rgba(0,0,0,0.35)); }
        .genre-card:hover .g-ico { transform:scale(1.2) rotate(8deg); }

        .g-info { position:relative; z-index:1; }
        .g-name { font-family:var(--h); font-size:21px; font-weight:700; display:block; margin-bottom:3px; }
        .g-count { font-size:12px; color:rgba(255,255,255,0.75); }

        .g-arrow {
            position:absolute; bottom:22px; right:22px; width:30px; height:30px;
            background:rgba(255,255,255,0.18); border-radius:50%;
            display:flex; align-items:center; justify-content:center; z-index:1;
            opacity:0; transform:translateX(-8px); transition:all var(--tr);
        }
        .genre-card:hover .g-arrow { opacity:1; transform:translateX(0); }

        /* MOVIE PAGE */
        .page-wrap { padding-top:70px; min-height:100vh; }

        .g-banner { padding:56px 32px; position:relative; overflow:hidden; }
        .g-banner::before { content:''; position:absolute; inset:0; background:inherit; opacity:0.55; }
        .g-banner-inner { position:relative; z-index:1; max-width:1400px; margin:0 auto; display:flex; align-items:center; gap:28px; flex-wrap:wrap; }
        .banner-ico { font-size:84px; filter:drop-shadow(0 8px 20px rgba(0,0,0,0.4)); }
        .banner-name { font-family:var(--h); font-size:clamp(2rem,5vw,3.5rem); font-weight:800; line-height:1; margin-bottom:12px; }
        .banner-desc { font-size:16px; color:rgba(255,255,255,0.8); max-width:580px; line-height:1.6; }

        .btn-back {
            display:inline-flex; align-items:center; gap:8px; padding:9px 18px;
            background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.15);
            border-radius:100px; color:rgba(255,255,255,0.8); text-decoration:none;
            font-size:13px; transition:all var(--tr); backdrop-filter:blur(8px); margin-bottom:14px;
        }
        .btn-back:hover { background:rgba(0,0,0,0.5); color:#fff; transform:translateX(-4px); }

        /* MOVIES */
        .movies-sec { padding:48px 32px; max-width:1400px; margin:0 auto; }
        .movies-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
        .movies-hdr-title { font-family:var(--h); font-size:22px; font-weight:700; }
        .movies-count { font-size:13px; color:var(--t2); background:var(--glass); border:1px solid var(--glass-b); padding:4px 12px; border-radius:100px; }
        .movies-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:22px; }

        .movie-card {
            border-radius:var(--r-md); overflow:hidden;
            background:var(--glass); border:1px solid var(--glass-b);
            transition:all var(--tr);
        }
        .movie-card:hover { transform:translateY(-8px); border-color:rgba(255,255,255,0.2); box-shadow:0 28px 56px rgba(0,0,0,0.5); }

        .m-poster {
            height:290px; position:relative; overflow:hidden;
            display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;
        }
        .m-poster-ico { font-size:60px; margin-bottom:14px; filter:drop-shadow(0 4px 12px rgba(0,0,0,0.5)); transition:transform var(--tr); }
        .movie-card:hover .m-poster-ico { transform:scale(1.15); }
        .m-poster-title { font-family:var(--h); font-size:16px; font-weight:700; text-align:center; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,0.6); line-height:1.3; }

        .m-yr-badge, .m-rate-badge {
            position:absolute; top:12px;
            background:rgba(0,0,0,0.55); backdrop-filter:blur(4px);
            font-size:12px; font-weight:600; padding:4px 10px; border-radius:100px;
        }
        .m-yr-badge { left:12px; color:#fff; border:1px solid rgba(255,255,255,0.12); }
        .m-rate-badge { right:12px; color:var(--star); border:1px solid rgba(245,158,11,0.3); }

        .m-info { padding:16px; }
        .m-title { font-family:var(--h); font-size:15px; font-weight:700; margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .m-meta { display:flex; align-items:center; gap:10px; font-size:11px; color:var(--t3); margin-bottom:8px; }
        .m-dir { font-size:12px; color:var(--t2); margin-bottom:8px; }
        .m-desc { font-size:12px; color:var(--t3); line-height:1.55; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
        .m-cast { margin-top:8px; font-size:11px; color:var(--t3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

        /* PILLS */
        .pills-sec { padding:0 32px 56px; max-width:1400px; margin:0 auto; }
        .pills-lbl { font-family:var(--h); font-size:16px; font-weight:600; color:var(--t2); margin-bottom:14px; }
        .pills { display:flex; flex-wrap:wrap; gap:10px; }
        .pill {
            display:inline-flex; align-items:center; gap:6px; padding:8px 16px;
            background:var(--glass); border:1px solid var(--glass-b);
            border-radius:100px; text-decoration:none; color:var(--t2);
            font-size:13px; transition:all var(--tr);
        }
        .pill:hover { background:var(--glass-h); border-color:rgba(255,255,255,0.2); color:var(--t1); transform:translateY(-2px); }
        .pill.active { background:var(--ag); border-color:transparent; color:#fff; }

        /* PARTICLES */
        .particle { position:fixed; pointer-events:none; border-radius:50%; animation:floatup linear infinite; opacity:0; }
        @keyframes floatup {
            0%{transform:translateY(100vh) scale(0);opacity:0}
            10%{opacity:0.6} 90%{opacity:0.3}
            100%{transform:translateY(-100px) scale(1);opacity:0}
        }

        /* FOOTER */
        footer { padding:36px 32px; text-align:center; border-top:1px solid var(--glass-b); color:var(--t3); font-size:13px; }
        footer span { background:var(--ag); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

        /* RESPONSIVE */
        @media(max-width:768px) {
            .nav{padding:12px 16px;}
            .hero{padding:80px 16px 40px;}
            .hero-stats{gap:24px;}
            .genres-sec{padding:40px 16px;}
            .genre-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;}
            .genre-card{height:140px;padding:16px;}
            .g-ico{font-size:36px;}
            .movies-sec,.pills-sec{padding:24px 16px;}
            .g-banner{padding:40px 16px;}
            .banner-ico{font-size:56px;}
            .movies-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:14px;}
            .m-poster{height:220px;}
        }
    </style>
</head>
<body>
<div id="particles"></div>

<nav class="nav">
    <a href="{% url 'home' %}" class="nav-brand">
        <div class="brand-ico">🎬</div>
        <div>
            <div class="brand-name">CineMatch</div>
        </div>
    </a>
    <div class="nav-tag">Your Personal Movie Guide</div>
</nav>

{% block content %}{% endblock %}

<footer>
    <p>Crafted with ❤️ by <span>CineMatch</span> · Discover your perfect movie tonight</p>
</footer>

<script>
    // Particles
    (function(){
        const c=document.getElementById('particles');
        const cols=['rgba(168,85,247,0.5)','rgba(236,72,153,0.5)','rgba(59,130,246,0.45)'];
        for(let i=0;i<18;i++){
            const p=document.createElement('div');
            p.className='particle';
            const s=Math.random()*4+2;
            p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}vw;background:${cols[i%3]};animation-duration:${Math.random()*10+8}s;animation-delay:${Math.random()*12}s;`;
            c.appendChild(p);
        }
    })();

    // Staggered card entrance
    document.addEventListener('DOMContentLoaded',function(){
        const cards=document.querySelectorAll('.genre-card,.movie-card');
        cards.forEach((card,i)=>{
            card.style.opacity='0';
            card.style.transform='translateY(28px)';
            setTimeout(()=>{
                card.style.transition='opacity 0.5s ease,transform 0.5s ease';
                card.style.opacity='1';
                card.style.transform='translateY(0)';
            },i*55+100);
        });
    });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
